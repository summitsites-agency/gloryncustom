name: Refresh Instagram feed

on:
  schedule:
    - cron: '0 9 * * 1' # 09:00 UTC every Monday
  workflow_dispatch: {}

permissions:
  contents: write

# Serialize runs so an overlapping scheduled + manual run can't race on git push.
concurrency:
  group: instagram-feed-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest Instagram posts (via Behold)
        env:
          BEHOLD_FEED_URL: ${{ vars.BEHOLD_FEED_URL }}
        run: node scripts/fetch-instagram.mjs

      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/instagram.json assets/img/instagram
          if git diff --cached --quiet; then
            echo "No feed changes."
          else
            git commit -m "chore: refresh Instagram feed"
            git push
          fi
